---
apiVersion: v1
kind: Service
metadata:
  name: registry
  labels:
    app.kubernetes.io/name: kokumi
    app.kubernetes.io/component: registry
    app.kubernetes.io/part-of: kokumi
    app.kubernetes.io/managed-by: kustomize
spec:
  type: NodePort
  selector:
    app: registry
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30050
      protocol: TCP
