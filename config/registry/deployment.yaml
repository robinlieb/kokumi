---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: system
  labels:
    app.kubernetes.io/name: kokumi
    app.kubernetes.io/component: registry
    app.kubernetes.io/part-of: kokumi
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:3
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/docker/registry
            - name: storage
              mountPath: /var/lib/registry
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: registry-config
        - name: storage
          persistentVolumeClaim:
            claimName: registry-pvc
