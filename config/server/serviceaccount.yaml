---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: server
  namespace: system
  labels:
    app.kubernetes.io/component: server
    app.kubernetes.io/name: kokumi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: server-role
rules:
- apiGroups:
  - delivery.kokumi.dev
  resources:
  - menu
  - orders
  - preparations
  - recipes
  - servings
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: server-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: server-role
subjects:
- kind: ServiceAccount
  name: server
  namespace: system