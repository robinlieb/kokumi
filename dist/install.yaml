apiVersion: v1
data:
  config.yml: |
    version: 0.1
    log:
      level: info

    http:
      addr: :5000

    storage:
      filesystem:
        rootdirectory: /var/lib/registry
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: registry
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: kokumi
    app.kubernetes.io/part-of: kokumi
  name: kokumi-registry-config
  namespace: kokumi
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: kokumi
    control-plane: controller-manager
  name: kokumi-controller-manager-metrics-service
  namespace: kokumi
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    app.kubernetes.io/name: kokumi
    control-plane: controller-manager
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: registry
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: kokumi
    app.kubernetes.io/part-of: kokumi
  name: kokumi-registry
  namespace: kokumi
